---
- name: Install Docker on GCP VM
  hosts: all
  become: true
  tasks:
 
    - name: Update apt packages
      apt:
        update_cache: yes
 
    - name: Install required packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
 
    - name: Install Docker
      apt:
        name: docker.io
        state: present
 
    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes
